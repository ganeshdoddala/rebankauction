name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build -- --configuration production

      # Required repository secrets:
      #   FIREBASE_SERVICE_ACCOUNT – JSON key for a Firebase service account with
      #     the "Firebase Hosting Admin" role. Generate it in the Firebase console
      #     (Project settings → Service accounts → Generate new private key) and
      #     add it as a secret in GitHub (Settings → Secrets → Actions).
      #   FIREBASE_PROJECT_ID – Your Firebase project ID (e.g. "rebankauction-abc12").
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
